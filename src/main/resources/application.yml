server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring:
  application:
    name: fintech-reliability-lab
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/fintech_lab}
    username: ${DATABASE_USERNAME:fintech_lab}
    password: ${DATABASE_PASSWORD:fintech_lab}
    hikari:
      maximum-pool-size: ${DATABASE_POOL_MAX_SIZE:10}
      minimum-idle: ${DATABASE_POOL_MIN_IDLE:2}
      pool-name: fintech-lab-hikari
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
    client-id: fintech-reliability-lab
    consumer:
      group-id: fintech-reliability-lab
      auto-offset-reset: earliest
    producer:
      properties:
        enable.idempotence: true
  lifecycle:
    timeout-per-shutdown-phase: 20s
  mvc:
    problemdetails:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,flyway,loggers
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  structured:
    format:
      console: ecs
    json:
      add:
        "service.environment": ${APP_ENV:local}
        "service.version": ${APP_VERSION:0.1.0-SNAPSHOT}
  level:
    com.fintechlab.reliability: INFO

info:
  app:
    name: ${spring.application.name}
    description: Fictional fintech reliability lab backend
    version: ${APP_VERSION:0.1.0-SNAPSHOT}
